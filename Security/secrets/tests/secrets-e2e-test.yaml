# This is an end to end test for the Secrets Resource Type.
# Prerequisites: Judo, a Kubernetes cluster, kubectl installed, and kube-context set property
#
# Install Judo:
# $ npm i -g @intuit/judo
#
# Execute test:
# $ judo secrets-e2e-test.yaml
#
# This file executes four tests sequentially:
#
#   1. install-radius-test.yaml: Installs a fresh installation of Radius and creates the test group and environment
#   2. secrets-resource-type-test.yaml: Creates the Secrets Resource Type, associated Bicep extension, and bicepconfig.json
#   3. secrets-kubernetes-terraform-test.yaml: Using Terraform, deploys a Secrets resource, verifies the Secret was created in Kubernetes, verifies the data is stored property, verifies the Kubernetes secret is deleted when the Radius resource is deleted
#   4. secrets-kubernetes-bicep-test.yaml: The same as previous except using Bicep
#   5. cleanup.yaml: Uninstalls Radius and deleted temporary files
#
run:
  installRadius:
    command: judo ../../../.tests/radius-install-test.yaml
    expectCode: 0
  secretsResourceTypeTest:
    command: judo secrets-resource-type-test.yaml
    expectCode: 0
  secretsKubernetesTerraformTest:
    command: judo secrets-kubernetes-terraform-test.yaml
    expectCode: 0
  # TODO: Not implemented yet
  # secretsKubernetesBicepTest:
  #   command: judo secrets-kubernetes-bicep-test.yaml
    # expectCode: 0
  cleanup:
    command: judo ../../../.tests/cleanup.yaml
    expectCode: 0