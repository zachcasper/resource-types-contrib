# This test creates the Secrets Resource Type and associated Bicep Extension
run:
  createResourceType:
    prerequisiteCwd: ..
    prerequisites: 
      - rad resource-type create -f secrets.yaml
    command: rad resource-type show Radius.Security/secrets
    expectCode: 0
    outputContains:
      - "Radius.Security/secrets"
  createBicepExtension:
    prerequisiteCwd: ..
    # This bicepconfig.json needs cleaning up at the end of tests
    prerequisites: 
      - 'echo "{ \"extensions\": { \"radius\": \"br:biceptypes.azurecr.io/radius:latest\", \"radiusResources\": \"radiusResources.tgz\" } }" > bicepconfig.json'
    cwd: ..
    command: rad bicep publish-extension -f secrets.yaml --target radiusResources.tgz
    expectCode: 0
    outputContainers:
      - "Successfully published Bicep extension"