# This test deploys the secretsTest.bicep template then verifies the Kubernetes secrets have been created property
run:
  updateEnvironmentWithRecipe:
    prerequisiteCwd: ..
    prerequisites: 
      - rad recipe register default --resource-type Radius.Security/secrets --template-kind terraform --template-path git::https://github.com/radius-project/resource-types-contrib.git//Security/secrets/recipes/kubernetes/terraform
    command: rad recipe show default --resource-type Radius.Security/secrets
    expectCode: 0
    outputContains:
      - /default.*Radius.Security/secrets.*terraform.*git::https://github.com/radius-project/resource-types-contrib.git//Security/secrets/recipes/kubernetes/terraform/
  createSecretResource:
    command: rad deploy secrets-resource.bicep
    expectCode: 0
    outputContains:
      - "Deployment Complete"
  getKubernetesSecret:
    command: 'kubectl get secret testsecret -n test-testapp -o jsonpath={.data.stringData}'
    expectCode: 0
    outputContains:
      - "this is a string"
  getEncodedKubernetesSecret:
    # Using bash -c because Judo expects a single executable, not a bash script
    command: bash -c 'kubectl get secret testsecret -n test-testapp -o jsonpath={.data.encodedData} | base64 --decode'
    expectCode: 0
    outputContains:
      - "this is a string"
  verifyResourcesGetDeleted:
    # TODO: Modify so that only a Secret is deployed rather than an app
    prerequisiteCwd: ..
    prerequisites:
      - rad app delete testApp -y
    command: kubectl get secret testsecret -n test-testapp
    expectCode: 1
    outputContains:
      - "secrets \"testsecret\" not found"